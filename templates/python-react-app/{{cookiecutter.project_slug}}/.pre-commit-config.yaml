# Local pre-commit gates — mirror the CI lint. Install once:
#   cd backend && uv run pre-commit install   (or: pipx run pre-commit install)
# Uses local hooks so each runs in the right working directory with the project's
# own config (the repo is a backend/ + frontend/ monorepo).
repos:
  - repo: local
    hooks:
      - id: ruff-backend
        name: ruff (backend lint, autofix)
        entry: bash -c 'cd backend && uv run ruff check --fix .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: ruff-format-backend
        name: ruff format (backend)
        entry: bash -c 'cd backend && uv run ruff format .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
